apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "build-deployer.saName" . }}
  namespace: {{ include "build-deployer.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "build-deployer.saName" . }}-edit
  namespace: {{ include "build-deployer.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: {{ include "build-deployer.saName" . }}
    namespace: {{ include "build-deployer.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "build-deployer.saName" . }}-{{ .Values.owner }}-triggers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openshift-pipelines-clusterinterceptors
subjects:
  - kind: ServiceAccount
    name: {{ include "build-deployer.saName" . }}
    namespace: {{ include "build-deployer.namespace" . }}
