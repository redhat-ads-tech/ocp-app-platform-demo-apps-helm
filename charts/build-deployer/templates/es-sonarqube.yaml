{{- if .Values.pipeline.tasks.sonarScan.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sonarqube-credentials
  namespace: {{ include "build-deployer.namespace" . }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: sonarqube-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.secrets.sonarqube.vaultKey }}
        property: value
{{- end }}
