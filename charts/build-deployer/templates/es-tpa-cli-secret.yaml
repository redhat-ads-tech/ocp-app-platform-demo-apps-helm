apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tpa-cli-secret
  namespace: {{ include "build-deployer.namespace" . }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: tpa-cli-secret
    creationPolicy: Owner
    template:
      data:
        client_id: tpa-cli
        client_secret: "{{"{{"}} .client_secret {{"}}"}}"
  data:
    - secretKey: client_secret
      remoteRef:
        key: {{ .Values.secrets.tpa.vaultKey }}
        property: value
