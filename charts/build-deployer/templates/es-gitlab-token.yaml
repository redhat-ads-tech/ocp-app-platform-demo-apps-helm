apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-credentials
  namespace: {{ include "build-deployer.namespace" . }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: gitlab-credentials
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: {{ .Values.secrets.gitlabWebhook.vaultKey }}
        property: value
